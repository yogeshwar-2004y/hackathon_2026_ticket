version: "3.8"
services:
  redis:
    image: redis:7
    container_name: ticketrouter_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:6.0
    container_name: ticketrouter_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data:

